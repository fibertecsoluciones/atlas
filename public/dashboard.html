<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Protección Civil</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    
    <!-- Estilos propios -->
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <!-- =============================================
    HEADER
    ============================================= -->
    <header class="header">
        <div class="header-left">
            <h1>🚨 Protección Civil</h1>
            <span class="header-subtitle">Sistema Atlas SAS</span>
        </div>
        <div class="header-right">
            <span class="municipio-badge" id="municipio-badge">Cargando...</span>
            <span class="user-name" id="user-name">👤 Cargando...</span>
            <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
    </header>

    <!-- =============================================
    BARRA DE ESTADÍSTICAS
    ============================================= -->
    <section class="stats-bar">
        <div class="stat-card">
            <div class="stat-icon">🚨</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-activos">0</span>
                <span class="stat-label">Activos</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🔄</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-proceso">0</span>
                <span class="stat-label">En Proceso</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-resueltos">0</span>
                <span class="stat-label">Resueltos</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🏠</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-albergues">0</span>
                <span class="stat-label">Albergues</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⚠️</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-riesgos">0</span>
                <span class="stat-label">Zonas Riesgo</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📅</div>
            <div class="stat-info">
                <span class="stat-number" id="stats-hoy">0</span>
                <span class="stat-label">Hoy</span>
            </div>
        </div>
    </section>

    <!-- =============================================
    CONTENEDOR PRINCIPAL (Mapa + Panel)
    ============================================= -->
    <main class="main-container">
        <!-- MAPA -->
        <div class="map-container">
            <div id="mapa-dashboard"></div>
            
            <!-- Controles del mapa (botones flotantes) -->
            <div class="map-controls">
                <button class="map-btn" onclick="centrarUbicacion()" title="Mi ubicación">📍</button>
                <button class="map-btn" onclick="zoomIn()" title="Acercar">➕</button>
                <button class="map-btn" onclick="zoomOut()" title="Alejar">➖</button>
                <button class="map-btn" onclick="resetMapa()" title="Restablecer vista">🏠</button>
            </div>
        </div>

       <!-- =============================================
PANEL LATERAL - TABS
============================================= -->
<div class="panel-tabs">
    <button class="tab-btn active" data-tab="incidentes">📋 Incidentes</button>
    <button class="tab-btn" data-tab="albergues">🏠 Albergues</button>
    <button class="tab-btn" data-tab="riesgos">⚠️ Riesgos</button>
    <button class="tab-btn" data-tab="municipios">🏛️ Municipios</button>   <!-- ← NUEVO -->
    <button class="tab-btn" data-tab="usuarios">👤 Usuarios</button>        <!-- ← NUEVO -->
    <button class="tab-btn" data-tab="reportar">📝 Reportar</button>
</div>

            <!-- CONTENIDO DE TABS -->
            <!-- TAB: Municipios -->
<div id="tab-municipios" class="tab-content">
    <div class="tab-header">
        <h3>🏛️ Municipios</h3>
        <button class="btn-agregar" onclick="abrirFormularioMunicipio()">➕ Agregar</button>
    </div>
    <div id="lista-municipios" class="lista-municipios">
        <div class="loading-spinner">Cargando municipios...</div>
    </div>
</div>

<!-- TAB: Usuarios -->
<div id="tab-usuarios" class="tab-content">
    <div class="tab-header">
        <h3>👤 Usuarios</h3>
        <button class="btn-agregar" onclick="abrirFormularioUsuario()">➕ Agregar</button>
    </div>
    <div id="lista-usuarios" class="lista-usuarios">
        <div class="loading-spinner">Cargando usuarios...</div>
    </div>
</div>
        </aside>
    </main>

    <!-- =============================================
    MODAL (para formularios)
    ============================================= -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-titulo">Título</h3>
                <button class="modal-close" onclick="cerrarModal()">✕</button>
            </div>
            <div id="modal-body">
                <!-- Contenido dinámico -->
            </div>
        </div>
    </div>

    <!-- =============================================
    TOAST NOTIFICATIONS
    ============================================= -->
    <div id="toast-container" class="toast-container"></div>

    <!-- =============================================
    SCRIPTS
    ============================================= -->
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    
    <!-- Scripts propios -->
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
