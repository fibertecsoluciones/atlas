<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Protección Civil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div class="header">
        <h1>🚨 Panel de Control - Protección Civil</h1>
        <div class="user-info">
            <span id="user-name">Cargando...</span>
            <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
        </div>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <h3>Incidentes Activos</h3>
            <div class="number" id="stats-activos">0</div>
        </div>
        <div class="stat-card">
            <h3>En Proceso</h3>
            <div class="number" id="stats-proceso">0</div>
        </div>
        <div class="stat-card">
            <h3>Resueltos Hoy</h3>
            <div class="number" id="stats-resueltos">0</div>
        </div>
        <div class="stat-card">
            <h3>Albergues</h3>
            <div class="number" id="stats-albergues">0</div>
        </div>
    </div>
    
    <div class="container">
        <div id="mapa"></div>
        <div class="incidentes-panel">
            <h3>📋 Incidentes Recientes</h3>
            <div id="lista-incidentes">
                <p>Cargando incidentes...</p>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
