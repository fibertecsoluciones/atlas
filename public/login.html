<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Protección Civil</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h1>🚨 Protección Civil</h1>
        <div class="subtitle">Sistema Atlas SAS</div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Municipio</label>
                <select id="municipio" required>
                    <option value="">Selecciona tu municipio</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" id="email" required placeholder="admin@municipio.gob.mx">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-login">Ingresar</button>
            
            <div class="error" id="error"></div>
            <div class="loading" id="loading">⏳ Verificando credenciales...</div>
        </form>
    </div>
    
    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
